AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Full-Stack Web Application deployment'

Resources:
  WebAppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP, HTTPS, and EC2 Instance Connect access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        # EC2 Instance Connect (us-east-1)
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 18.206.107.24/29

  WebAppInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      SecurityGroups:
        - !Ref WebAppSecurityGroup
      ImageId: ami-0c7217cdde317cfec  # Ubuntu 22.04 LTS in us-east-1 (update for your region)
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          
          # Update system
          apt-get update
          apt-get upgrade -y
          
          # Install basic tools
          apt-get install -y git curl wget unzip

          # Install Node.js 18.x
          curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
          apt-get install -y nodejs

          # Install MySQL
          apt-get install -y mysql-server

          # Install Nginx
          apt-get install -y nginx

          # Install PM2 globally
          npm install -g pm2

          # Install Certbot
          apt-get install -y certbot python3-certbot-nginx

          # Create application directory and set permissions
          mkdir -p /var/www/app/{frontend,backend}
          
          # Set ubuntu user as owner
          chown -R ubuntu:ubuntu /var/www/app

          # Create deployment directory
          mkdir -p /home/ubuntu/deployment
          chown -R ubuntu:ubuntu /home/ubuntu/deployment

          # Configure MySQL to start on boot
          systemctl enable mysql
          
          # Configure Nginx to start on boot
          systemctl enable nginx

          # Setup PM2 to start on boot
          pm2 startup systemd -u ubuntu --hp /home/ubuntu
          systemctl enable pm2-ubuntu

          # Create a welcome message
          echo "Web application environment is ready. Please use EC2 Instance Connect to access the server and deploy your application." > /home/ubuntu/welcome.txt

          # Schedule a reboot in 1 minute to ensure all services are properly started
          # This gives time for the UserData script to complete
          (sleep 60 && reboot) &

Outputs:
  InstanceId:
    Description: Instance ID of the created EC2 instance
    Value: !Ref WebAppInstance

  PublicDNS:
    Description: Public DNS name of the created EC2 instance
    Value: !GetAtt WebAppInstance.PublicDnsName

  PublicIP:
    Description: Public IP address of the created EC2 instance
    Value: !GetAtt WebAppInstance.PublicIp 